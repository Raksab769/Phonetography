<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phonetography — Mobile Photography</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    
  <header class="site-header">
    <div class="wrap">
      <h1>Phonetography</h1>
      <p class="tag">A mobile photography showcase</p>
    </div>
  </header>

  <main class="wrap">
    <section class="gallery" aria-label="Photo gallery">
      <figure>
        <img src="https://images.unsplash.com/photo-1504198458649-3128b932f49f?w=1000&q=80&auto=format&fit=crop" alt="Golden hour phone shot">
        <figcaption>Golden hour</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1000&q=80&auto=format&fit=crop" alt="Street mobile shot">
        <figcaption>Urban street</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d?w=1000&q=80&auto=format&fit=crop" alt="Portrait with phone">
        <figcaption>Soft portrait</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=1000&q=80&auto=format&fit=crop" alt="Nature phone photo">
        <figcaption>Misty morning</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1482192596544-9eb780fc7f66?w=1000&q=80&auto=format&fit=crop" alt="Abstract phone angle">
        <figcaption>Abstract angle</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=1000&q=80&auto=format&fit=crop" alt="Night mobile shot">
        <figcaption>Night lights</figcaption>
      </figure>
    </section>
  </main>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="lb-close" aria-label="Close">×</button>
    <img class="lb-image" src="" alt="">
    <p class="lb-caption"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
